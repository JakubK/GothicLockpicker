name: Build and Publish

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Publish all RIDs
        shell: bash
        run: |
          RIDS=(
            "win-x64"
            "win-arm64"
            "linux-x64"
            "linux-arm64"
            "osx-x64"
            "osx-arm64"
          )

          PROJECT="./GothicLockPicker.Console/GothicLockPicker.Console.csproj"

          for RID in "${RIDS[@]}"; do
            echo "Publishing $RID..."

            dotnet publish "$PROJECT" \
              -c Release \
              -r "$RID" \
              --self-contained true \
              -p:PublishSingleFile=true \
              -p:PublishTrimmed=true \
              -o "publish/$RID"
          done

      - name: Upload artifacts (Windows x64)
        uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: |
            publish/win-x64/*

      - name: Upload artifacts (Windows ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: win-arm64
          path: |
            publish/win-arm64/*

      - name: Upload artifacts (Linux x64)
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            publish/linux-x64/*

      - name: Upload artifacts (Linux ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            publish/linux-arm64/*

      - name: Upload artifacts (macOS x64)
        uses: actions/upload-artifact@v4
        with:
          name: osx-x64
          path: |
            publish/osx-x64/*

      - name: Upload artifacts (macOS ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: osx-arm64
          path: |
            publish/osx-arm64/*